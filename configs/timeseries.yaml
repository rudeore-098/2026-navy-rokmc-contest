# 시계열 설정
# 실전 1순위: feature engineering 후 LightGBM (type: tabular 재사용)
# 사용: python -m src.train --config configs/timeseries.yaml --exp exp_ts_001

type: tabular           # 시계열도 feature 만든 뒤 정형으로 푸는 게 강력
task: regression        # 보통 수치 예측

seed: 42
n_folds: 5

target_col: "target"
id_col: "id"
group_col: null         # 시계열 누수 주의: 시간 기반 분할이 필요하면 별도 처리

paths:
  train: "data/train.csv"
  test: "data/test.csv"

# lag/rolling feature 설정 (src/models/timeseries.make_lag_features 참고)
features:
  lags: [1, 2, 3, 7]
  rolling: [3, 7]

params_by_kind:
  lgb:
    learning_rate: 0.05
    num_leaves: 31
