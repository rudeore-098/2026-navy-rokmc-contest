# 비전 설정 — timm 백본
# 사용: python -m src.train --config configs/vision.yaml --exp exp_vis_001
# (GPU/torch/timm 환경 필요)

type: vision
task: multiclass        # 보통 이미지 분류

seed: 42
n_folds: 5

target_col: "label"
id_col: "id"
path_col: "filepath"

paths:
  train: "data/train.csv"
  test: "data/test.csv"

# 모델
model_name: "tf_efficientnet_b0_ns"   # 앙상블 시 convnext_small, swin 등으로 교체
img_size: 224
in_chans: 3
pretrained: true        # 오프라인 대회면 weights/에서 로컬 로드로 변경

# 학습
epochs: 10
batch_size: 32
lr: 0.001

# 증강
augmentation:
  hflip: true
  # 음향(스펙트로그램)이면 specaugment 사용
  specaugment: false
