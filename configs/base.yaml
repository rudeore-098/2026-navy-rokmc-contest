# 공통 설정 — 모든 config가 상속하는 기본값
# 실제 사용 시 task별 config(tabular/vision/timeseries)가 이 값을 덮어쓴다.

seed: 42
n_folds: 5

# 데이터 경로 (서버 마운트 경로 규칙에 맞게 수정)
paths:
  train: "data/train.csv"
  test: "data/test.csv"
  sample_submission: "data/sample_submission.csv"

# 컬럼 이름 (대회 데이터에 맞게 수정)
target_col: "target"
id_col: "id"
group_col: null        # 녹음 ID 등 그룹 누수 방지가 필요하면 컬럼명 지정 → GroupKFold

# 산출물
output_dir: "experiments"
