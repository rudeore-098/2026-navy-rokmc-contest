# Task 2 — 선박 ID 검색 (Retrieval)
# 평가: Recall@1×0.5 + Recall@3×0.3 + Recall@5×0.2
#
# 데이터 준비 (한 번만):
#   mklink /D "data\train"      "C:\...\competition_final\train"
#   mklink /D "data\task2_test" "C:\...\competition_final\task2_test"
#   copy "C:\...\competition_final\task2_target_ships.csv" "data\"

type: audio
task: retrieval         # 임베딩 기반 검색 (분류가 아님)

seed: 42

# ── 경로 ──────────────────────────────────────────────────────────────────────
paths:
  train:          "data/train/train.csv"
  train_audio:    "data/train/audio"

  task2_gallery:  "data/task2_test/gallery.csv"
  task2_val:      "data/task2_test/val.csv"
  task2_test:     "data/task2_test/test.csv"
  task2_audio:    "data/task2_test/audio"

  target_ships:   "data/task2_target_ships.csv"   # 평가 대상 100척 ship_id
  sample_sub:     "data/sample_submission_task2.csv"

# ── 음향 파라미터 (Task 1과 동일하게 유지) ────────────────────────────────────
sample_rate: 32000
duration:    5.0
n_mels:      128
n_fft:       2048
hop_length:  512
f_min:       50
f_max:       16000

# ── 모델 ──────────────────────────────────────────────────────────────────────
model_name: "eca_nfnet_l0"
in_chans:   1
pretrained: true
embed_dim:  512          # 임베딩 벡터 차원 (코사인 유사도 검색에 사용)

# ── 학습 (362척 ship_id 기준 분류 → 임베딩 추출) ────────────────────────────
epochs:      30
batch_size:  32
lr:          1.0e-3
num_workers: 4
