# Task 1 — 선종 분류 (4-class Macro F1)
# 사용: python -m src.train --config configs/audio_task1.yaml --exp exp_t1_001
#
# 데이터 준비 (한 번만):
#   data/ 아래에 대회 폴더를 복사 또는 심볼릭링크
#   mklink /D "data\train"      "C:\...\competition_final\train"
#   mklink /D "data\task1_test" "C:\...\competition_final\task1_test"

type: audio
task: multiclass        # Macro F1

seed: 42
n_folds: 5
group_col: ship_id      # 같은 배 클립이 train/val에 섞이지 않도록 GroupKFold

# ── 경로 ──────────────────────────────────────────────────────────────────────
paths:
  train:       "data/train/train.csv"
  train_audio: "data/train/audio"

  task1_val:   "data/task1_test/val.csv"
  task1_test:  "data/task1_test/test.csv"
  task1_audio: "data/task1_test/audio"

  ship_list:   "data/ship_list.csv"
  sample_sub:  "data/sample_submission_task1.csv"

target_col: "ship_type"

# ── 음향 파라미터 ──────────────────────────────────────────────────────────────
sample_rate: 32000
duration:    5.0
n_mels:      128
n_fft:       2048
hop_length:  512
f_min:       50
f_max:       16000

# ── 모델 ──────────────────────────────────────────────────────────────────────
model_name: "tf_efficientnet_b2_ns"
in_chans:   1
pretrained: true
use_cqt:    false

# AIS 피처 차원: sog(1) + sin/cos×cog(2) + sin/cos×hdg(2) + cog_missing(1) + hdg_missing(1) = 7
ais_dim: 7

# ── 학습 ──────────────────────────────────────────────────────────────────────
epochs:      20
batch_size:  32
lr:          3.0e-4
num_workers: 2

focal_gamma:          1.0   # FocalLoss γ (2.0→1.0: 다수 클래스 A 학습 여지 확보)
class_weight_sqrt:    true  # true=sqrt 스케일 완화, false=balanced (기존)
class_weight_clip_min: 0.5  # 하한 완화 (기존 0.1 → 0.5)
class_weight_clip_max: 5.0  # 상한 완화 (기존 10  → 5.0)

ais_hidden:      64    # AIS branch 히든 차원 (7→128→64)
audio_compress:  256   # 음향 특징 압축 차원 (2304→256, 0=비활성)

mixup_p:         0.3   # 완화 (0.5→0.3)
mixup_alpha:     0.4
label_smoothing: 0.05  # 완화 (0.1→0.05)
tta_n:           3

# 스펙트로그램 캐시 (첫 실행에서 변환 후 .npy로 저장 → 이후 librosa 호출 없음)
cache_spectrograms: true
cache_dir: "data/spec_cache"
