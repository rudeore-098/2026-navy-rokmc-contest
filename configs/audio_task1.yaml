# Task 1 — 선종 분류 (4-class Macro F1) · AST 백본
# 사용: python -m src.train --config configs/audio_task1_ast.yaml --exp exp_t1_ast
#
# CNN(eca_nfnet_l0)용 audio_task1.yaml 과 거의 동일하나,
# AST는 자체 front-end(16kHz/kaldi-fbank/1024프레임)를 쓰므로
#   - use_npy: false  (precompute mel 무시, WAV에서 직접 16kHz 변환)
#   - lr 작게, batch 작게 (모델이 큼 ~86M)

type: audio
task: multiclass

seed: 42
n_folds: 5              # AST 5-fold full FT는 무거움 → 우선 3 정도로 줄여 감 잡아도 됨
group_col: ship_id

paths:
  train:       "data/train/train.csv"
  train_audio: "data/train/audio"
  task1_val:   "data/task1_test/val.csv"
  task1_test:  "data/task1_test/test.csv"
  task1_audio: "data/task1_test/audio"
  ship_list:   "data/ship_list.csv"
  sample_sub:  "data/sample_submission_task1.csv"

target_col: "ship_type"

# ── 음향 파라미터 (AST는 자체 front-end로 아래 mel 파라미터를 무시함) ──────────
sample_rate: 32000     # 원본 SR (AST 데이터셋이 내부에서 16k로 리샘플)
duration:    5.0
use_npy:     false     # ★ AST 필수: precompute mel 대신 WAV→16k fbank

# ── 모델 (AST) ────────────────────────────────────────────────────────────────
model_name:   "ast"    # "ast" 가 들어가면 AST 경로로 분기
ast_model_id: "MIT/ast-finetuned-audioset-10-10-0.4593"
pretrained:   true
ais_dim:      8

# ── 학습 ──────────────────────────────────────────────────────────────────────
epochs:       5        # AST는 빨리 수렴. 너무 길면 과적합/시간낭비
batch_size:   12       # OOM 나면 8. (GPU 메모리 따라 16까지)
lr:           1.0e-5   # ★ AST full fine-tune는 1e-5 권장 (CNN의 1e-3 아님)
weight_decay: 1.0e-4
num_workers:  4